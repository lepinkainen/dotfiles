##### Prefix / keybinds #####
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Detach: avoid C-d (EOF). Use prefix + d (default) or something safe.
unbind C-d
bind d detach-client

bind BSpace previous-window
bind C-a last-window

##### Terminal / colors #####
# Modern tmux terminfo + truecolor (works well with Ghostty)
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:RGB"

# Fast ESC handling for modern terminals/editor modes
set -sg escape-time 0

# For apps that care about TERM_PROGRAM etc
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

##### Pane styling (modern options) #####
set -g window-style "fg=colour247,bg=colour232"
set -g window-active-style "fg=colour250,bg=colour232"

# Optional: borders (modern style keys)
# set -g pane-border-style "fg=colour236"
# set -g pane-active-border-style "fg=colour250"

##### Mouse #####
set -g mouse on

##### Window handling #####
unbind k
bind k confirm-before -p "kill-window? (y/n)" kill-window

# Splits (open in current path)
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind C split-window -h -c "#{pane_current_path}"
unbind '"'
unbind %

# Navigate panes with Alt+arrow (no prefix needed)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Resize panes with prefix + Alt+arrow
bind -r M-Left resize-pane -L 5
bind -r M-Right resize-pane -R 5
bind -r M-Up resize-pane -U 5
bind -r M-Down resize-pane -D 5

# Zoom toggle (prefix + z is default, but explicit is nice)
bind z resize-pane -Z


##### Titles & status bar #####
set -g set-titles on
set -g set-titles-string "#W #T"

##### Status bar: dual-line top #####
set -g status-position top
set -g status 2

set -g status-format[0] "#[bg=#1a1a1a,fg=#ffffff,fill=#1a1a1a,align=left,bold][#{=20:session_name}]#[nobold] #{W:#[fg=#888888]#I:#W#F | ,#[fg=#ffffff,bold]#I:#W#F | }"
#set -g status-format[0] "#[bg=#1a1a1a,fg=#ffffff,fill=#1a1a1a,align=left,bold][#{=20:session_name}]#[nobold] #{W:#[fg=#888888]#I:#W#F |#[fg=#ffffff],#[fg=#ffffff,bold]#I:#W#F#[nobold] |}"
set -g status-format[1] "#[bg=#1a1a1a,fg=#ffffff,fill=#1a1a1a,align=right]#(whoami)@#h"
# Darker blue
set -g status-style "bg=#1a1a1a,fg=#ffffff"

# status style (modern replacements for status-bg/status-fg)
#set -g status-style "bg=colour018,fg=white"
#set -g status-justify left

#set -g status-left "#[fg=white,bold][#S]#[nobold] "

# macOS-compatible loadavg + user@host
# sysctl: "1min 5min 15min"
#set -g status-right "#[fg=white,bold][#[nobold]#(sysctl -n vm.loadavg | sed 's/{ //; s/ }//') #(whoami)@#h#[fg=white,bold]]#[nobold]"

#set -g window-status-format "#I:#W#F |"
#set -g window-status-current-format "#I:#W#F |"

##### SSH / Mosh helpers #####
bind-key S command-prompt -p "ssh:"  "new-window -n %1 'ssh %1'"
bind-key M command-prompt -p "mosh:" "new-window -n %1 'mosh %1'"

##### Yazi / image preview passthrough #####
# tmux >= 3.3
set -g allow-passthrough on

##### Resize behavior #####
# For local single-machine usage, ON usually feels better.
# If you frequently attach from different-sized terminals and don't want churn, keep it OFF.
setw -g aggressive-resize on

